
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:450px;
}

.box{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:25px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tabs button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#ddd;
cursor:pointer;
font-weight:bold;
}

.tabs button.active{
background:#007bff;
color:white;
}

.form{
display:none;
}

.form.active{
display:block;
}

</html>
