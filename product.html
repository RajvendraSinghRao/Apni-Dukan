<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Product Details</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
}

header{
background:#007bff;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.backBtn{
background:white;
color:#007bff;
padding:10px 15px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.product-box{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.1);
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.image-box img{
width:100%;
border-radius:12px;
object-fit:cover;
max-height:500px;
}

.details{
display:flex;
flex-direction:column;
}

.details h1{
margin-bottom:15px;
font-size:32px;
}

.price{
font-size:35px;
color:green;
font-weight:bold;
margin-bottom:15px;
}

.category{
display:inline-block;
padding:8px 14px;
background:#007bff;
color:white;
border-radius:30px;
margin-bottom:20px;
width:max-content;
}

.desc{
font-size:17px;
line-height:1.7;
color:#444;
margin-bottom:25px;
}

.shop{
font-size:18px;
margin-bottom:20px;
font-weight:bold;
}

.btns{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.btns button{
flex:1;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:white;
}

.cartBtn{
background:#007bff;
}

.buyBtn{
background:green;
}

</style>
</head>
<body>

<header>

<h2>Product Details</h2>

<button
class="backBtn"
onclick="
window.location='home.html'
">
Back
</button>

</header>



<div class="container">

<div
class="product-box"
id="productBox">
</div>

</div>

<script>

// =====================================
// CHECK LOGIN
// =====================================

const userToken =
localStorage.getItem(
"userToken"
);

if(!userToken){

window.location =
"index.html";

}



// =====================================
// GET PRODUCT
// =====================================

const product =
JSON.parse(
localStorage.getItem(
"selectedProduct"
)
);

if(!product){

window.location =
"home.html";

}



// =====================================
// SHOW PRODUCT
// =====================================

document.getElementById(
"productBox"
).innerHTML = `

<div class="image-box">

<img src="${product.image}">

</div>

<div class="details">

<h1>${product.title}</h1>

<div class="price">
₹ ${product.price}
</div>

<div class="category">
${product.category}
</div>

<div class="shop">
Seller: ${product.shopName}
</div>

<div class="desc">
${product.description}
</div>

<div class="btns">

<button
class="cartBtn"
onclick="addToCart()">
Add To Cart
</button>

<button
class="buyBtn"
onclick="buyNow()">
Buy Now
</button>

</div>

</div>

`;



// =====================================
// ADD TO CART
// =====================================

function addToCart(){

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

cart.push(product);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("Added To Cart");

}



// =====================================
// BUY NOW
// =====================================

function buyNow(){

localStorage.setItem(
"buyNowProduct",
JSON.stringify(product)
);

window.location =
"cart.html";

}

</script>

</body>
</html>
