<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f2f2f2;
padding:20px;
}

.box{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:15px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0056b3;
}
</style>

</head>

<body>

<div class="box">

<h2>Add Product</h2>

<input id="title" placeholder="Product Title">
<input id="price" type="number" placeholder="Price">

<select id="category">
<option value="">Select Category</option>
<option>Electronics</option>
<option>Fashion</option>
<option>Books</option>
<option>Home</option>
<option>Beauty</option>
<option>Sports</option>
</select>

<textarea id="description" placeholder="Description"></textarea>

<input id="imageUrl" placeholder="Image URL">

<button onclick="saveProduct()">Save Product</button>

</div>

<script>

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbxShR62soMxOhS6nhnxCQMT8dAzUoSVQF2NN-5HoZsxgzDmr8Ty4_VnfI1yCrPwWYz2/exec";

const SELLER_API =
"https://script.google.com/macros/s/AKfycbwDYlOmBvYI3uw6Wqk7pNJdvxvLpJH0xe8JGY1XSRz1yd_e5GYuO5lGIBRJaU4mFChz/exec";

const sellerToken = localStorage.getItem("sellerToken");

if(!sellerToken){
window.location = "index.html";
}

let seller = null;

// LOAD SELLER
async function loadSeller(){
try{
let res = await fetch(SELLER_API + "?action=getSellers");
let data = await res.json();

seller = data.find(s => s.token === sellerToken);

if(!seller){
alert("Login again");
window.location = "index.html";
}
}catch(err){
alert("Seller load failed");
console.log(err);
}
}

loadSeller();

// SAVE PRODUCT
function saveProduct(){

let title = document.getElementById("title").value;
let price = document.getElementById("price").value;
let category = document.getElementById("category").value;
let description = document.getElementById("description").value;
let image = document.getElementById("imageUrl").value;

if(!title || !price || !category || !description || !image){
alert("Fill all fields");
return;
}

if(!seller){
alert("Seller not loaded");
return;
}

let product = {
action:"addProduct",
productId:"P_" + Date.now(),
sellerCode:seller.sellerCode,
shopName:seller.shopName,
title:title,
price:price,
category:category,
description:description,
image:image
};

fetch(PRODUCT_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(product)
})
.then(res => res.json())
.then(data=>{

console.log("SERVER:",data);

if(data.success){
alert("Product Saved Successfully");
window.location="my-products.html";
}else{
alert("Failed: " + JSON.stringify(data));
}

})
.catch(err=>{
console.log(err);
alert("Network Error (check deployment)");
});

}

</script>

</body>
</html>
