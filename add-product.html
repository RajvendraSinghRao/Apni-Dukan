<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f2f2f2;
padding:20px;
}

.box{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>Add Product</h2>

<input id="title" placeholder="Product Title">
<input id="price" type="number" placeholder="Price">

<select id="category">
<option value="">Select Category</option>
<option>Electronics</option>
<option>Fashion</option>
<option>Books</option>
<option>Home</option>
<option>Beauty</option>
<option>Sports</option>
</select>

<textarea id="description" placeholder="Description"></textarea>

<input id="imageUrl" placeholder="Image URL">

<button onclick="saveProduct()">Save Product</button>

</div>

<script>

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbwDSjmRqPBzWOs11kO55qbHkJfUWgRPYt5F-TVUE7dlEvEuS6kTVp09kL3MoRbGmETK/exec";

const SELLER_API =
"https://script.google.com/macros/s/AKfycbwDYlOmBvYI3uw6Wqk7pNJdvxvLpJH0xe8JGY1XSRz1yd_e5GYuO5lGIBRJaU4mFChz/exec";

const sellerToken = localStorage.getItem("sellerToken");

if(!sellerToken){
window.location = "index.html";
}

let seller = null;

// LOAD SELLER
async function loadSeller(){
let res = await fetch(SELLER_API+"?action=getSellers");
let data = await res.json();

seller = data.find(s => s.token === sellerToken);

if(!seller){
alert("Login again");
window.location = "index.html";
}
}

loadSeller();

// SAVE PRODUCT
function saveProduct(){

let title = document.getElementById("title").value;
let price = document.getElementById("price").value;
let category = document.getElementById("category").value;
let description = document.getElementById("description").value;
let image = document.getElementById("imageUrl").value;

if(!title || !price || !category || !description || !image){
alert("Fill all fields");
return;
}

let product = {
action:"addProduct",
productId:"P_"+Date.now(),
sellerCode:seller.sellerCode,
shopName:seller.shopName,
title:title,
price:price,
category:category,
description:description,
image:image
};

const form = new FormData();

form.append("data", JSON.stringify(product));

fetch(PRODUCT_API,{
method:"POST",
body:form
})
.then(res => res.text())
.then(data=>{
console.log(data);
alert("Saved");
});

}

</script>

</body>
</html>
