<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
    body{background:#f2f2f2;padding:20px;}
    .box{max-width:600px;margin:auto;background:white;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
    h2{text-align:center;margin-bottom:15px;}
    input,textarea,select{width:100%;padding:10px;margin-top:10px;border:1px solid #ccc;border-radius:6px;}
    button{width:100%;padding:12px;margin-top:15px;background:#007bff;color:white;border:none;border-radius:6px;cursor:pointer;font-size:16px;}
    button:disabled{background:#999;cursor:not-allowed;}
    button:hover:enabled{background:#0056b3;}
    .seller-info{margin-top:15px;font-weight:bold;color:#007bff;text-align:center;}
  </style>
</head>
<body>
  <div class="box">
    <h2>Add Product</h2>
    <div class="seller-info" id="sellerInfo">Loading seller...</div>
    <input id="title" placeholder="Product Title">
    <input id="price" type="number" placeholder="Price">
    <select id="category">
      <option value="">Select Category</option>
      <option>Electronics</option>
      <option>Fashion</option>
      <option>Books</option>
      <option>Home</option>
      <option>Beauty</option>
      <option>Sports</option>
    </select>
    <textarea id="description" placeholder="Description"></textarea>
    <input id="imageUrl" placeholder="Image URL">
    <button id="saveBtn" onclick="saveProduct()" disabled>Save Product</button>
  </div>

<script>
const PRODUCT_API = "https://script.google.com/macros/s/AKfycbzrFBGL_dqkZiyVnESGw3L-ZrYLYNQLR8aFYvZ2rHjQFPRrvCmIycn5Z0j-z2mnm3Rp/exec";
const SELLER_API = "https://script.google.com/macros/s/AKfycbxUcxeGA-axA5URmEkg4smfyMjFbqbFQN8_lqRCuVZ_yOxn0rZdEg4LVURcEBMkCZUa/exec";

const sellerToken = localStorage.getItem("sellerToken");
let seller = null;

// Load seller info
async function loadSeller() {
  try {
    const res = await fetch(SELLER_API + "?action=getSellers");
    const data = await res.json();
    seller = data.find(s => s.token === sellerToken);
    if (!seller) {
      alert("Seller not found. Please login again.");
      localStorage.removeItem("sellerToken");
      window.location = "index.html";
    } else {
      document.getElementById("sellerInfo").innerText =
        "Seller: " + seller.shopName + " (Code: " + seller.sellerCode + ")";
      document.getElementById("saveBtn").disabled = false; // enable button
    }
  } catch (err) {
    console.error("SELLER LOAD ERROR:", err);
    alert("Seller API failed");
  }
}
loadSeller();

// Save product
async function saveProduct() {
  if (!seller) {
    alert("Wait until seller code loads before saving.");
    return;
  }
  try {
    const title = document.getElementById("title").value.trim();
    const price = document.getElementById("price").value.trim();
    const category = document.getElementById("category").value.trim();
    const description = document.getElementById("description").value.trim();
    const image = document.getElementById("imageUrl").value.trim();

    if (!title || !price || !category || !description || !image) {
      alert("Fill all fields");
      return;
    }

    const product = {
      action: "addProduct",
      productId: "P_" + Date.now(),
      sellerCode: seller.sellerCode,
      shopName: seller.shopName,
      title,
      price,
      category,
      description,
      image
    };

    const res = await fetch(PRODUCT_API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(product)
    });

    const text = await res.text();
    console.log("RAW RESPONSE:", text);

    let data;
    try { data = JSON.parse(text); }
    catch (e) { alert("Server returned invalid response"); return; }

    if (data.success) {
      alert("Product Saved Successfully");
      window.location = "my-products.html";
    } else {
      alert("SAVE FAILED: " + (data.error || "Unknown error"));
    }
  } catch (err) {
    console.error("SAVE ERROR:", err);
    alert("Network error / deployment issue");
  }
}
</script>
</body>
</html>
