<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.box{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
resize:none;
height:120px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.preview{
width:100%;
margin-top:15px;
border-radius:10px;
display:none;
}

.backBtn{
background:#555;
}
</style>

</head>
<body>

<div class="container">
<div class="box">

<h2>Add Product</h2>

<input type="text" id="title" placeholder="Product Title">
<input type="number" id="price" placeholder="Product Price">

<select id="category">
<option value="">Select Category</option>
<option>Electronics</option>
<option>Fashion</option>
<option>Books</option>
<option>Home</option>
<option>Beauty</option>
<option>Sports</option>
</select>

<textarea id="description" placeholder="Product Description"></textarea>

<!-- 🔥 IMAGE URL INPUT -->
<input type="text" id="imageUrl" placeholder="Paste Image URL (ImgBB / Google Drive / any link)">

<!-- Preview -->
<img id="preview" class="preview">

<button onclick="saveProduct()">Save Product</button>

<button class="backBtn" onclick="window.location='seller.html'">Back</button>

</div>
</div>

<script>

const SELLER_API =
"https://script.google.com/macros/s/AKfycbwDYlOmBvYI3uw6Wqk7pNJdvxvLpJH0xe8JGY1XSRz1yd_e5GYuO5lGIBRJaU4mFChz/exec";

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbylZu-Ps1qeqrqo3cvhYIna1MC_uVA9RPNxPcpl6-1YupVrGvfb_WvD-Oq8NuHF-rGh/exec";

const sellerToken = localStorage.getItem("sellerToken");

if(!sellerToken){
window.location = "index.html";
}

let currentSeller = null;

async function loadSeller(){
const res = await fetch(SELLER_API + "?action=getSellers");
const sellers = await res.json();

currentSeller = sellers.find(s => s.token === sellerToken);

if(!currentSeller){
alert("Seller not found");
window.location = "index.html";
}
}
loadSeller();

function saveProduct(){

const title = document.getElementById("title").value;
const price = document.getElementById("price").value;
const category = document.getElementById("category").value;
const description = document.getElementById("description").value;
const imageUrl = document.getElementById("imageUrl").value;

if(!title || !price || !category || !description || !imageUrl){
alert("Fill all fields");
return;
}

// preview image
document.getElementById("preview").src = imageUrl;
document.getElementById("preview").style.display = "block";

const product = {
action:"addProduct",
productId:"PRODUCT_" + Date.now(),
sellerCode: currentSeller.sellerCode,
shopName: currentSeller.shopName,
title:title,
price:price,
category:category,
description:description,
image:imageUrl
};

fetch(PRODUCT_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(product)
})
.then(res => res.text())
.then(data => {
console.log(data);
alert("Product Added Successfully");
window.location="my-products.html";
})
.catch(err=>{
console.log(err);
alert("Failed to save product");
});

}

</script>

</body>
</html>
