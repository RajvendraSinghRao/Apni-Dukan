<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.box{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
resize:none;
height:120px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.preview{
width:100%;
margin-top:15px;
border-radius:10px;
display:none;
}

.backBtn{
background:#555;
}

.loading{
margin-top:10px;
text-align:center;
display:none;
}
</style>

</head>
<body>

<div class="container">
<div class="box">

<h2>Add Product</h2>

<input type="text" id="title" placeholder="Product Title">
<input type="number" id="price" placeholder="Product Price">

<select id="category">
<option value="">Select Category</option>
<option>Electronics</option>
<option>Fashion</option>
<option>Books</option>
<option>Home</option>
<option>Beauty</option>
<option>Sports</option>
</select>

<textarea id="description" placeholder="Product Description"></textarea>

<input type="file" id="imageFile" accept="image/*" onchange="previewImage()">

<img id="preview" class="preview">

<div id="loading" class="loading">Uploading Image...</div>

<button onclick="saveProduct()">Save Product</button>

<button class="backBtn" onclick="window.location='seller.html'">Back</button>

</div>
</div>

<script>

const SELLER_API =
"https://script.google.com/macros/s/AKfycbwDYlOmBvYI3uw6Wqk7pNJdvxvLpJH0xe8JGY1XSRz1yd_e5GYuO5lGIBRJaU4mFChz/exec";

const PRODUCT_API =
"https://script.google.com/macros/s/AKfycbylZu-Ps1qeqrqo3cvhYIna1MC_uVA9RPNxPcpl6-1YupVrGvfb_WvD-Oq8NuHF-rGh/exec";

const IMGBB_API_KEY =
"ed1de9bdaa660d84c2f47a43795c4236";

const sellerToken = localStorage.getItem("sellerToken");

if(!sellerToken){
window.location = "index.html";
}

let currentSeller = null;

async function loadSeller(){
const res = await fetch(SELLER_API + "?action=getSellers");
const sellers = await res.json();

currentSeller = sellers.find(s => s.token === sellerToken);

if(!currentSeller){
alert("Seller not found");
localStorage.removeItem("sellerToken");
window.location = "index.html";
}
}
loadSeller();

function previewImage(){
const file = document.getElementById("imageFile").files[0];
if(!file) return;

const reader = new FileReader();
reader.onload = e => {
document.getElementById("preview").src = e.target.result;
document.getElementById("preview").style.display = "block";
};
reader.readAsDataURL(file);
}

async function uploadImage(file){

document.getElementById("loading").style.display = "block";

const formData = new FormData();
formData.append("image", file);

const res = await fetch(
"https://api.imgbb.com/1/upload?key=" + IMGBB_API_KEY,
{
method:"POST",
body:formData
}
);

const data = await res.json();

document.getElementById("loading").style.display = "none";

if(!data || !data.data){
alert("Image upload failed");
return null;
}

return data.data.url;
}

async function saveProduct(){

try{

const title = document.getElementById("title").value;
const price = document.getElementById("price").value;
const category = document.getElementById("category").value;
const description = document.getElementById("description").value;
const file = document.getElementById("imageFile").files[0];

if(!title || !price || !category || !description || !file){
alert("Fill all fields");
return;
}

const imageUrl = await uploadImage(file);

if(!imageUrl){
alert("Image upload failed");
return;
}

const product = {
action:"addProduct",
productId:"PRODUCT_" + Date.now(),
sellerCode: currentSeller.sellerCode,
shopName: currentSeller.shopName,
title,
price,
category,
description,
image:imageUrl
};

const res = await fetch(PRODUCT_API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(product)
});

const result = await res.text();
console.log(result);

alert("Product Added Successfully");

window.location="my-products.html";

}catch(err){
console.log(err);
alert("Error: " + err.message);
}

}

</script>

</body>
</html>
